<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForesightJS — React + Vue</title>
  </head>
  <body>
    <div id="toolbar">
      <span class="brand">ForesightJS</span>
      <div class="controls">
        <label class="ctl">
          Reactivate
          <input id="reactivate-input" type="number" min="0" step="500" />
          ms
        </label>
        <button id="btn-debug" type="button">Debug: off</button>
        <button id="btn-reset" type="button">Reset</button>
        <div class="switch">
          <button id="btn-react" data-fw="react" type="button">React</button>
          <button id="btn-vue" data-fw="vue" type="button">Vue</button>
        </div>
      </div>
    </div>
    <div id="react-root"></div>
    <div id="vue-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
